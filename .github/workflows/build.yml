name: Build iw1x

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt update && sudo apt install -y meson ninja-build gcc-multilib g++-multilib

    - name: Build
      run: |
        meson setup build -Dcompile_sqlite=false -Dcompile_curl=false -Dcompile_ssl=false
        meson compile -C build

    - name: Upload .so
      uses: actions/upload-artifact@v4
      with:
        name: iw1x
        path: build/iw1x.so
